<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmokeSoft - Gestión Inteligente</title>
    <link rel="stylesheet" href="css/estilosIndex.css">
    </head>
<body>
    <header class="header">
        <div class="logo">
            <img src="img/logo-smokesoft.png" alt="Logo SmokeSoft">
            <h1>SmokeSoft</h1>
        </div>
        <nav class="menu">
            <a href="index.html" class="activo">Inicio</a>
            <a href="html/contenido.html">Productos</a>
            <a href="html/contactenos.html">Contáctenos</a>
            <a href="html/admin.html">Administración</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="hero-content">
            <img src="img/logo-smokesoft.png" alt="Logo Grande SmokeSoft" class="main-logo">
            
            <h1 class="main-title">SMOKESOFT</h1>
            
            <p class="subtitle">Control inteligente para una gestión eficiente</p>
            
            <a href="html/registro.html" class="btn-ingresar">Ingresar</a>
        </div>
    </div>
    
    <style>
        /* Estilos básicos para el contenido de index.html, puedes agregarlos a estilosIndex.css */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 50px 20px;
            flex: 1; /* Para que ocupe el espacio principal si el body es flex */
        }

        .hero-content {
            margin-top: 50px;
        }

        .main-logo {
            width: 200px; /* Ajusta el tamaño según tu diseño */
            margin-bottom: 20px;
        }

        .main-title {
            color: #fff;
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
        }

        .subtitle {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn-ingresar {
            background: #00e0d1;
            color: #000;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: background 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 224, 209, 0.4);
        }

        .btn-ingresar:hover {
            background: #00cccc;
        }
    </style>
</body>
</html>
