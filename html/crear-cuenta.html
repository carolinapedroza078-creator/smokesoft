<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - SmokeSoft</title>
  <link rel="stylesheet" href="../css/estilosIndex.css">
  <link rel="stylesheet" href="../css/estilosRegistro.css">
</head>
<body>
  <header class="encabezado">
    <div class="logo">
      <img src="../img/logo-smokesoft.png" alt="Logo SmokeSoft">
      <h1>SmokeSoft</h1>
    </div>
    <nav class="navegacion">
      <a href="../index.html">Inicio</a>
      <a href="contenido.html">Productos</a>
      <a href="contactenos.html">Contáctenos</a>
      <a href="admin.html">Administración</a>
    </nav>
  </header>

  <main class="contenedor-crear-cuenta">
    <div class="caja-crear-cuenta">
      <h2>Crear Cuenta</h2>
      <p>Completa el formulario para registrarte</p>

      <form id="formularioCrearCuenta" class="formulario-dos-columnas">
        
        <!-- Columna izquierda -->
        <div class="columna">
          <div class="grupo-campo">
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" placeholder="ejemplo@correo.com" required>
          </div>
          
          <div class="grupo-campo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required>
          </div>
          
          <div class="grupo-campo">
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" placeholder="Tus apellidos" required>
          </div>
          
          <div class="grupo-campo">
            <label for="tipoDocumento">Tipo de documento:</label>
            <select id="tipoDocumento" required>
              <option value="CC">Cédula de Ciudadanía</option>
              <option value="TI">Tarjeta de Identidad</option>
              <option value="CE">Cédula de Extranjería</option>
            </select>
          </div>
          
          <div class="grupo-campo">
            <label for="numeroDocumento">Número de documento:</label>
            <input type="text" id="numeroDocumento" placeholder="Número de documento" required>
          </div>
          
          <div class="grupo-campo">
            <label for="celular">Celular:</label>
            <input type="tel" id="celular" placeholder="+57 300 000 0000" required>
          </div>
        </div>

        <!-- Columna derecha -->
        <div class="columna">
          <div class="grupo-campo">
            <label for="nombreUsuario">Nombre de usuario:</label>
            <input type="text" id="nombreUsuario" placeholder="Define tu usuario" required>
          </div>
          
          <div class="grupo-campo">
            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" required>
          </div>
          
          <div class="grupo-campo">
            <label for="confirmarContrasena">Confirmar contraseña:</label>
            <input type="password" id="confirmarContrasena" placeholder="Repite tu contraseña" required>
          </div>
        </div>

        <!-- Boton que ocupa las dos columnas -->
        <div class="fila-completa">
          <button type="submit" class="boton-crear">Crear Cuenta</button>
          
          <div class="enlace-iniciar">
            <p>¿Ya tienes cuenta? <a href="registro.html">Inicia Sesión</a></p>
          </div>
        </div>
      </form>
    </div>
  </main>

  <footer class="pie-pagina">
    <p>&copy; 2025 SmokeSoft - Todos los derechos reservados</p>
  </footer>

  <script>
    // Cuando se envia el formulario
    document.getElementById('formularioCrearCuenta').onsubmit = function(evento) {
      evento.preventDefault();
      
      var contrasena = document.getElementById('contrasena').value;
      var confirmar = document.getElementById('confirmarContrasena').value;
      var nombre = document.getElementById('nombre').value;
      
      // Verificar que las contraseñas coincidan
      if (contrasena !== confirmar) {
        alert('Las contraseñas no coinciden');
        return;
      }
      
      alert('¡Cuenta creada exitosamente! Bienvenido ' + nombre);
      window.location.href = 'registro.html';
    };
  </script>
</body>
</html>
