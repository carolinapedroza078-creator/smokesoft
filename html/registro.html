<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - SmokeSoft</title>
  <link rel="stylesheet" href="../css/estilosIndex.css">
  <link rel="stylesheet" href="../css/estilosRegistro.css">
</head>
<body>
  <header class="encabezado">
    <div class="logo">
      <img src="../img/logo-smokesoft.png" alt="Logo SmokeSoft">
      <h1>SmokeSoft</h1>
    </div>
    <nav class="navegacion">
      <a href="../index.html">Inicio</a>
      <a href="contenido.html">Productos</a>
      <a href="contactenos.html">Contáctenos</a>
      <a href="admin.html">Administración</a>
    </nav>
  </header>

  <main class="contenedor-registro">
    <div class="caja-registro">
      <div class="logos-superiores">
        <img src="../img/logotitle.jpeg" alt="Logo SmokeSoft">
        <img src="../img/rollingTimes.jpeg" alt="Rolling Times">
      </div>

      <h2>Iniciar Sesión</h2>
      <p>Ingresa tus datos para acceder</p>

      <!-- Aviso para pruebas -->
      <div class="aviso-prueba">
        <strong>Datos de prueba:</strong><br>
        Usuario: cualquiera<br>
        Contraseña: cualquiera
      </div>

      <form id="formularioRegistro">
        <div class="grupo-campo">
          <label for="usuario">Usuario:</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>
        </div>

        <div class="grupo-campo">
          <label for="contrasena">Contraseña:</label>
          <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="boton-ingresar">Ingresar</button>

        <div class="enlace-recuperar">
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        
        <div class="enlace-crear">
          <p>¿No tienes cuenta? <a href="crear-cuenta.html">Crear Cuenta</a></p>
        </div>
      </form>
    </div>
  </main>

  <footer class="pie-pagina">
    <p>&copy; 2025 SmokeSoft - Todos los derechos reservados</p>
  </footer>

  <script>
    // Cuando se envia el formulario
    document.getElementById('formularioRegistro').onsubmit = function(evento) {
      evento.preventDefault();
      
      var usuario = document.getElementById('usuario').value;
      var contrasena = document.getElementById('contrasena').value;
      
      // Verificar credenciales
      if (usuario !== '' && contrasena !== '') {
        alert('Bienvenido ' + usuario + '!');
        window.location.href = 'contenido.html';
      } else {
        alert('Por favor completa todos los campos');
      }
    };
  </script>
</body>
</html>
