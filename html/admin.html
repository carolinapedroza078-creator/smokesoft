<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración - SmokeSoft</title>
  <link rel="stylesheet" href="../css/estilosIndex.css">
  <link rel="stylesheet" href="../css/estilosAdmin.css">
</head>
<body>
  <header class="encabezado encabezado-publico">
    <div class="logo">
      <img src="../img/logo-smokesoft.png" alt="Logo SmokeSoft">
      <h1>SmokeSoft</h1>
    </div>
    <nav class="navegacion">
      <a href="../index.html">Inicio</a>
      <a href="contenido.html">Productos</a>
      <a href="contactenos.html">Contáctenos</a>
      <a href="admin.html" class="activo">Administración</a>
    </nav>
  </header>

  <!-- Seccion de Inicio de Sesion -->
  <div id="seccionInicioSesion" class="contenedor-inicio-sesion">
    <div class="caja-inicio-sesion">
      <h2>Iniciar Sesión</h2>
      <p>Ingresa tus datos para entrar al panel</p>

      <div class="aviso-prueba">
        <strong>Datos de prueba:</strong><br>
        Usuario: admin<br>
        Contraseña: 12345678
      </div>

      <form id="formularioInicioSesion">
        <div class="grupo-campo">
          <label for="campoUsuario">Usuario:</label>
          <input type="text" id="campoUsuario" placeholder="Escribe tu usuario" required>
        </div>

        <div class="grupo-campo">
          <label for="campoContrasena">Contraseña:</label>
          <input type="password" id="campoContrasena" placeholder="Escribe tu contraseña" required>
        </div>

        <p id="textoError" class="texto-error"></p>

        <button type="submit" class="boton-entrar">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- Panel de Administracion -->
  <div id="panelAdministracion" class="panel-administracion">
    <div class="layout-admin">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo-sidebar">
          <img src="../img/logo-smokesoft.png" alt="SmokeSoft">
          <span>SmokeSoft</span>
        </div>

        <nav class="menu-lateral">
          <button class="item-menu activo" data-modulo="dashboard">
            <span class="icono-menu">📊</span> Dashboard
          </button>
          <button class="item-menu" data-modulo="usuarios">
            <span class="icono-menu">👤</span> Usuarios
          </button>
          <button class="item-menu" data-modulo="clientes">
            <span class="icono-menu">👥</span> Clientes
          </button>
          <button class="item-menu" data-modulo="proveedores">
            <span class="icono-menu">🏭</span> Proveedores
          </button>
          <button class="item-menu" data-modulo="productos">
            <span class="icono-menu">📦</span> Productos
          </button>
          <button class="item-menu item-salir" id="btnCerrarSesion">
            <span class="icono-menu">🚪</span> Cerrar Sesión
          </button>
        </nav>
      </aside>

      <!-- Area principal -->
      <div class="area-principal">
        <header class="encabezado-admin">
          <button class="btn-menu-hamburguesa" id="btnToggleSidebar" aria-label="Toggle menu">☰</button>
          <div class="info-usuario">
            <div class="datos-usuario">
              <div class="nombre-usuario">Administrador</div>
              <div class="rol-usuario">admin</div>
            </div>
            <div class="avatar-usuario">A</div>
          </div>
        </header>

        <main id="contenidoModulo" class="contenido-modulo"></main>
      </div>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/mockData.js"></script>
  <script src="../js/crudFactory.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
